services:

  api:
    image: fastapi-rag-gpu:v1

    container_name: fastapi-rag

    ports:
      - "8000:8000"

    env_file:
      - .env

    depends_on:
      - postgres

    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]


  postgres:
    image: pgvector/pgvector:pg15

    container_name: rag-postgres

    environment:
      POSTGRES_USER: fastapi_user
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: fastapi_rag_db

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data


volumes:

  postgres_data: